version: "3.9"

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: farmchain_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: farmchain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farmchain_dev_pw}
      POSTGRES_DB: farmchain
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmchain"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: farmchain_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mqtt:
    image: eclipse-mosquitto:2
    container_name: farmchain_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: farmchain_backend
    restart: unless-stopped
    env_file:
      - ../../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mqtt:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  pg_data:
  redis_data:
  mqtt_data:
  mqtt_log:

name: agrofamily
description: AGROFAMILY - connecting the agriculture chain in Cameroon
publish_to: "none"
version: 0.5.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.5
  flutter_vlc_player: ^7.4.1
  stream_chat_flutter: ">=8.2.0 <99.0.0
  geolocator: ">=13.0.1 <99.0.0"
  camera: ^0.11.0
  video_compress: ^3.1.3
  image_picker: ^1.1.2
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  intl: ^0.19.0
  flutter_secure_storage: ^9.2.2
  qr_code_scanner: ^1.0.1
  fl_chart: ^0.68.0
  google_maps_flutter: ^2.9.0
  pin_code_fields: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/images/
